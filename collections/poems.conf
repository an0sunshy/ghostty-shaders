# Collection manifest for shaders/poems/.
# Read by `ghostty-shaders list` (description) and documents the strategy.
description = Animated classical Chinese poems (静夜思, 春江花月夜, …)
strategy = static

# Compute budget (read by bench/run-bench.sh). Poems are opt-in static art a
# user selects by hand — not the always-on weather default — so they carry a
# higher per-frame ceiling than weather's 5%. 75% of one 120 Hz frame (≈6.25 ms
# at worst-case Retina) clears the heaviest curated scene (~60%) with thermal
# margin while still flagging anything that would drop frames.
budget_pct = 75

# Matcher knobs (read by libexec/.../select). The poller scores every poem
# against live facts via collections/poems.{index,rules}.json, then samples:
#   selection_temperature — softmax sharpness. 0 = always the top match
#     (deterministic); higher = more variety among strong candidates.
#   recency_window        — how many of the most recent auto-picks to penalize
#     so the wheel doesn't repeat a scene back-to-back.
#   recency_penalty       — score subtracted from a scene still in that window.
selection_temperature = 0.6
recency_window = 4
recency_penalty = 2.0
