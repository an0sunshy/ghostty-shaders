name: CI

# push is filtered to main so PR branches don't run everything twice
# (the pull_request trigger already covers them).
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (shell + GLSL + markdown)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck and glslang-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck glslang-tools

      - name: Shellcheck all bash scripts
        run: |
          set -euo pipefail
          # Collect scripts from each location that exists; tolerate absent dirs.
          files=()
          for pattern in bin/* install.sh bench/*.sh scripts/* tests/*; do
            for f in $pattern; do
              [ -f "$f" ] || continue
              case "$f" in
                *.c|*.glsl|*.md) continue ;;
              esac
              # Only lint files that are shell scripts (shebang or .sh suffix).
              if [ "${f##*.}" = "sh" ] || head -n1 "$f" | grep -qE '^#!.*\b(bash|sh)\b'; then
                files+=("$f")
              fi
            done
          done
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No shell scripts found to lint." >&2
            exit 0
          fi
          printf 'Linting:\n'
          printf '  %s\n' "${files[@]}"
          shellcheck "${files[@]}"

      # Every scene must compile under BOTH host profiles: the desktop GL
      # wrapping the bench harness uses (a stand-in for Ghostty's own
      # compile) and the WebGL2 ES wrapping the web gallery compiles in the
      # browser. This is what keeps scenes inside the portable GLSL subset.
      - name: Validate GLSL scenes (gl410 + es300) with glslangValidator
        run: |
          set -euo pipefail
          shopt -s nullglob
          scenes=(shaders/scenes/*.glsl)
          if [ "${#scenes[@]}" -eq 0 ]; then
            echo "No scenes found under shaders/scenes/." >&2
            exit 1
          fi
          rc=0
          for f in "${scenes[@]}"; do
            for profile in gl410 es300; do
              frag="/tmp/$(basename "$f" .glsl).$profile.frag"
              echo "== wrapping $f ($profile) -> $frag"
              bench/wrap-shader.sh --profile "$profile" "$f" > "$frag"
              if ! glslangValidator "$frag"; then
                echo "::error file=$f::glslangValidator failed for $f ($profile)"
                rc=1
              fi
            done
          done
          exit "$rc"

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

  test:
    name: Unit tests (scene mapping, moon phase, env parsing)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run the suite
        run: tests/run-tests.sh

  compute-gate:
    name: Compute gate (macOS GPU benchmark)
    runs-on: macos-14
    env:
      GHOSTTY_WEATHER_BENCH_JSON: bench-results.json
      GHOSTTY_WEATHER_BENCH_FRAMES: "200"
      GHOSTTY_WEATHER_BENCH_TRIALS: "5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run compute benchmark gate (<5% of frame budget)
        run: bench/run-bench.sh

      - name: Golden image check
        run: bench/golden.sh check

      - name: Append results to job summary
        if: always()
        run: |
          {
            echo "## ghostty-weather compute gate"
            echo
            if [ -f bench-results.json ]; then
              echo '```json'
              cat bench-results.json
              echo '```'
            else
              echo "_No bench-results.json was produced._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            bench-results.json
            bench/golden/**
          if-no-files-found: ignore
